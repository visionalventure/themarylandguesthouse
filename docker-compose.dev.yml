version: '3.9'

# Development override — only runs infrastructure services
services:
  postgres:
    image: postgres:16-alpine
    container_name: mgh-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: mgh_user
      POSTGRES_PASSWORD: mgh_dev_pass
      POSTGRES_DB: maryland_guesthouse_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mgh_user']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mgh-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning

volumes:
  postgres_dev_data:
    driver: local
